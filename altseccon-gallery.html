<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AltSecCON Gallery</title>

<style>

/* ========================= GLOBAL ========================= */
body{
  margin:0;
  font-family:system-ui;
  background:#F9FAFB;
  color:#111827;
}

/* ========================= HERO ========================= */
.hero{
  text-align:center;
  padding:80px 20px 30px;
}

.hero h1{
  font-size:42px;
}

.hero span{
  color:#B91C1C;
}

.gallery-desc{
  text-align:center;
  max-width:650px;
  margin:10px auto 40px;
  color:#6B7280;
  line-height:1.6;
}

/* ========================= GRID FIXED ========================= */
.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  padding:0 20px;
}

.item{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  opacity:0;
  transform:translateY(30px);
  transition:0.6s;
}

.item.show{
  opacity:1;
  transform:translateY(0);
}

/* masonry feel */
.item:nth-child(3n){
  grid-row:span 2;
}

.item img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:0.5s;
}

.item:hover img{
  transform:scale(1.08);
}

/* overlay */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.4), transparent);
  opacity:0;
  transition:0.3s;
}

.item:hover .overlay{
  opacity:1;
}

/* ========================= LIGHTBOX ========================= */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

.lightbox.active{
  display:flex;
}

/* nav */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  color:#fff;
  cursor:pointer;
}

.prev{ left:30px; }
.next{ right:30px; }

/* ========================= VIDEO ========================= */
.video-section{
  max-width:900px;
  margin:80px auto;
  padding:0 20px;
}

.video-card{
  position:relative;
  aspect-ratio:16/9;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
}

.video-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.play{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.play div{
  width:80px;
  height:80px;
  border-radius:50%;
  background:#B91C1C;
  color:#fff;
  font-size:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.3s;
}

.play div:hover{
  transform:scale(1.1);
}

/* video modal */
.video-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.video-modal video{
  width:90%;
  max-width:900px;
}

/* ========================= CTA ========================= */
.gallery-cta{
  padding:80px 20px;
  background:#111827;
  color:#fff;
  text-align:center;
}

.cta-box{
  max-width:700px;
  margin:auto;
}

.gallery-cta h2{
  font-size:32px;
  margin-bottom:10px;
}

.gallery-cta p{
  color:#D1D5DB;
  margin-bottom:25px;
}

.cta-btn{
  background:#B91C1C;
  color:#fff;
  padding:14px 26px;
  border-radius:8px;
  text-decoration:none;
  font-weight:600;
  display:inline-block;
  transition:0.3s;
}

.cta-btn:hover{
  background:#EA3037;
  transform:translateY(-2px);
}

/* ========================= RESPONSIVE ========================= */
@media(max-width:900px){
  .gallery{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:600px){
  .gallery{
    grid-template-columns:1fr;
  }

  .hero h1{
    font-size:28px;
  }
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>AltSecCON <span>Gallery</span></h1>
  <p class="gallery-desc">
    Explore real moments from AltSecCON training — hands-on labs, collaborative learning, 
    and deep technical sessions led by expert instructors.
  </p>
</div>

<!-- GALLERY -->
<div class="gallery">

  <!-- images -->
  <div class="item"><img src="https://redteamverse.github.io/red-team-training/images/AltSecCON-Gallary-1.webp"></div>
  <div class="item"><img src="https://redteamverse.github.io/red-team-training/images/AltSecCON-Gallary-7.webp"></div>
  <div class="item"><img src="https://redteamverse.github.io/red-team-training/images/AltSecCON-Gallary-8.webp"></div>
  <div class="item"><img src="https://redteamverse.github.io/red-team-training/images/AltSecCON-Gallary-5.webp"></div>
  <div class="item"><img src="https://redteamverse.github.io/red-team-training/images/AltSecCON-Gallary-4.webp"></div>
  <div class="item"><img src="https://redteamverse.github.io/red-team-training/images/AltSecCON-9212.webp"></div>
  <div class="item"><img src="https://redteamverse.github.io/red-team-training/images/c5.webp"></div>
  <div class="item"><img src="https://redteamverse.github.io/red-team-training/images/new-2.webp"></div>
  <div class="item"><img src="https://redteamverse.github.io/red-team-training/images/new-5.webp"></div>
  <div class="item"><img src="https://redteamverse.github.io/red-team-training/images/new-7.webp"></div>
  <div class="item"><img src="https://redteamverse.github.io/red-team-training/images/PostTrainingLabAccess.webp"></div>
  <div class="item"><img src="https://redteamverse.github.io/red-team-training/images/new-3.webp"></div>
  <div class="item"><img src="https://redteamverse.github.io/red-team-training/images/coursecontent.webp"></div>

</div>

<!-- VIDEO -->
<div class="video-section">
  <div class="video-card" id="videoCard">
    <img src="https://redteamverse.github.io/red-team-training/images/AltSecCON-Gallary-8.webp">
    <div class="play"><div>▶</div></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="nav prev" id="prev">&#10094;</span>
  <img id="lightImg">
  <span class="nav next" id="next">&#10095;</span>
</div>

<!-- VIDEO MODAL -->
<div class="video-modal" id="videoModal">
  <video controls autoplay>
    <source src="https://redteamverse.github.io/red-team-training/images/ASVideos.webm">
  </video>
</div>

<!-- CTA -->
<section class="gallery-cta">
  <div class="cta-box">
    <h2>Be a Part of This Year's AltSecCON</h2>
    <p>Join professionals and gain real-world red team experience.</p>

    <a href="https://redteamverse.github.io/red-team-training/altseccon-book-tickets.html" 
       class="cta-btn">
       Book Your Ticket
    </a>
  </div>
</section>

<script>

/* ========================= FADE-IN ========================= */
const items = document.querySelectorAll(".item");

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

items.forEach(el=>observer.observe(el));

/* ========================= LIGHTBOX ========================= */
const lightbox = document.getElementById("lightbox");
const lightImg = document.getElementById("lightImg");

let index = 0;
const images = document.querySelectorAll(".item img");

images.forEach((img,i)=>{
  img.onclick=()=>{
    index=i;
    lightImg.src=img.src;
    lightbox.classList.add("active");
  }
});

document.getElementById("next").onclick=()=>{
  index=(index+1)%images.length;
  lightImg.src=images[index].src;
};

document.getElementById("prev").onclick=()=>{
  index=(index-1+images.length)%images.length;
  lightImg.src=images[index].src;
};

lightbox.onclick=()=>lightbox.classList.remove("active");

/* ========================= VIDEO ========================= */
const videoModal = document.getElementById("videoModal");

document.getElementById("videoCard").onclick=()=>{
  videoModal.style.display="flex";
};

videoModal.onclick=()=>{
  videoModal.style.display="none";
};

/* ========================= KEYBOARD ========================= */
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    lightbox.classList.remove("active");
    videoModal.style.display="none";
  }
  if(e.key==="ArrowRight") document.getElementById("next").click();
  if(e.key==="ArrowLeft") document.getElementById("prev").click();
});

</script>

</body>
</html>
